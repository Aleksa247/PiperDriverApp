android.useAndroidX=true
org.gradle.jvmargs=-Xmx4g -Xms1g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.dependency.useConstraints=true
# Required: app uses resValue() for Mapbox token
android.defaults.buildfeatures.resvalues=true
# KSP uses kotlin.sourceSets which conflicts with AGP 9.0 built-in Kotlin
android.disallowKotlinSourceSets=false